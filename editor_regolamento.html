<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editor Documentazione - SPRING CUP 2026</title>
  <link rel="stylesheet" href="/SPRINGCUP2026/theme.css">
</head>
<body>

  <main class="page">
    <section class="panel hero">
      <div class="badge">Editor</div>
      <img src="/SPRINGCUP2026/logo.png" alt="Logo Spring Cup" class="logo">
      <h1>Editor Documentazione</h1>
      <p class="lead">Gestione file PDF e generazione JSON per la sezione documentazione</p>
    </section>

    <section class="panel hero">
      <h2>📂 Carica file</h2>
      <input type="file" id="pdfInput" accept=".pdf">
      <a href="#" class="btn" id="uploadFileButton">⬆️ Carica File</a>
      <a href="#" class="btn secondary" id="generateJsonButton">💾 Genera JSON</a>
    </section>

    <section class="panel hero">
      <h2>👁️ Anteprima del file caricato</h2>
      <pre id="previewDati" class="list-card" style="text-align:left; overflow:auto;">Nessun file caricato.</pre>
    </section>

    <section class="panel hero">
      <h2>📄 File caricati</h2>
      <div class="table-wrap">
        <table id="pdfTable">
          <thead>
            <tr>
              <th>Nome del Documento</th>
              <th>Download</th>
              <th>Rimuovi</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
      <div id="jsonDownloadContainer"></div>
    </section>

    <section class="panel hero">
      <a href="regolamento.html" class="btn secondary">🏠 Torna alla pagina Documentazione</a>
    </section>
  </main>

  <script src="editor_regolamento.js"></script>
</body>
</html>
