<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editor Interviste - SPRING CUP 2026</title>
  <link rel="stylesheet" href="/SPRINGCUP2026/theme.css">
</head>
<body>
  <main class="page">
    <section class="panel hero">
      <div class="badge">Editor</div>
      <img src="/SPRINGCUP2026/logo.png" alt="Logo Spring Cup" class="logo">
      <h1>Editor Interviste</h1>
      <p class="lead">Gestione interviste per album/cartelle e generazione JSON</p>
    </section>

    <section class="panel hero">
      <h2>🎤 Carica intervista</h2>
      <input type="file" id="intervistaInput" multiple accept="video/*">
      <input type="text" id="albumInput" placeholder="Nome album/cartella es. UNDER17">
      <input type="text" id="descriptionInput" placeholder="Descrizione intervista (facoltativa)">
      <a href="#" class="btn" id="uploadFileButton">⬆️ Aggiungi Intervista</a>
      <a href="#" class="btn secondary" id="generateJsonButton">💾 Genera JSON</a>
    </section>

    <section class="panel hero">
      <h2>👁️ Anteprima del caricamento</h2>
      <pre id="previewDati" class="list-card" style="text-align:left; overflow:auto;">Nessun file caricato.</pre>
    </section>

    <section class="panel hero">
      <h2>📂 Interviste caricate</h2>
      <div id="albumsContainer"></div>
      <div id="jsonDownloadContainer"></div>
    </section>

    <section class="panel hero">
      <a href="interviste.html" class="btn secondary">🏠 Vai alla pagina Interviste</a>
    </section>
  </main>

  <script src="editor_interviste.js"></script>
</body>
</html>
