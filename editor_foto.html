<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editor Foto - SPRING CUP 2026</title>
  <link rel="stylesheet" href="/SPRINGCUP2026/theme.css">
</head>
<body>
  <main class="page">
    <section class="panel hero">
      <div class="badge">Editor</div>
      <img src="/SPRINGCUP2026/logo.png" alt="Logo Spring Cup" class="logo">
      <h1>Editor Foto</h1>
      <p class="lead">Gestione foto per album/cartelle e generazione JSON per la galleria</p>
    </section>

    <section class="panel hero">
      <h2>📂 Carica foto</h2>
      <input type="file" id="fotoInput" accept="image/*">
      <input type="text" id="albumInput" placeholder="Nome album/cartella es. PRIMA_GIORNATA">
      <a href="#" class="btn" id="uploadFileButton">⬆️ Aggiungi Foto</a>
      <a href="#" class="btn secondary" id="generateJsonButton">💾 Genera JSON</a>
    </section>

    <section class="panel hero">
      <h2>👁️ Anteprima del file caricato</h2>
      <pre id="previewDati" class="list-card" style="text-align:left; overflow:auto;">Nessun file caricato.</pre>
    </section>

    <section class="panel hero">
      <h2>🖼️ Foto caricate</h2>
      <div id="albumsContainer"></div>
      <div id="jsonDownloadContainer"></div>
    </section>

    <section class="panel hero">
      <a href="foto.html" class="btn secondary">🏠 Vai alla pagina Foto</a>
    </section>
  </main>

  <script src="editor_foto.js"></script>
</body>
</html>
